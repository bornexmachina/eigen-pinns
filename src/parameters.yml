config:
  mesh_file: "./resources/bunny.obj"
  diagnostics_viz: "./outputs/diagnostics.png"
  vtu_file: "./outputs/bunny_model.vtu"
  verbose: false
  do_extensive_visuals: false

utils:
  normalization_eps: 1E-9
  prolongation_neighbors: 9
  knn_graph_neighbors: 9

correctorGNN:
  hidden_layers: [256, 256, 256, 256, 256, 256]
  dropout: 0.0

multigridGNN:
  # Extended training for curriculum learning
  epochs: 20000
  
  # Higher initial LR (will decay automatically)
  learning_rate: 0.005
  
  # Smaller corrections = more stable learning
  corrector_scale: 0.5
  
  # Base weights (modulated by curriculum scheduler)
  weight_residual: 1000.0
  weight_orthogonal: 100.0
  weight_projection: 10.0
  
  # The trace (sum of eigenvalues) cannot reach zero - it's fixed by geometry!
  # Setting this too high fights against physics
  weight_trace: 0.0
  
  # Eigenvalue ordering and matching
  w_order: 2.0      # Increased: keep modes well-separated
  w_eigen: 1.0      # Match coarse eigenvalues
  
  # Tighter gradient clipping for stability
  gradient_clipping: 10.0
  
  # Stronger regularization
  weight_decay: 0.0001
  
  log_every: 250

runner:
  n_modes: 64
  hierarchy: [256, 512, 1024]
  k_neighbors: 4
